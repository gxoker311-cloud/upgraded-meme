<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gxoker UBT EXAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@500;700&family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-cyan: #00f2ff; 
            --neon-blue: #0062ff;
            --deep-purple: #7000ff;
            --dark-void: #02040a;
            --glass-blur: rgba(255, 255, 255, 0.02);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Montserrat', 'Pyidaungsu', sans-serif; }
        body { margin: 0; background: var(--dark-void); color: #e2e8f0; overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }

        /* 🌊 Animated Deep Ocean Gradient Background */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 30%, var(--deep-purple) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, var(--neon-blue) 0%, transparent 40%);
            opacity: 0.2; filter: blur(100px); z-index: -1; animation: ocean-shift 15s linear infinite alternate;
        }

        @keyframes ocean-shift { 0% { transform: rotate(0deg) scale(1); } 100% { transform: rotate(10deg) scale(1.3); } }

        /* 🛰️ Cyber Header */
        .header { display: flex; align-items: center; background: rgba(0, 0, 0, 0.9); height: 52px; padding: 0 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.2); position: relative; }
        .header::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); }
        .brand { font-family: 'Orbitron'; font-weight: 900; color: var(--neon-cyan); font-size: 11px; letter-spacing: 2px; text-shadow: 0 0 8px var(--neon-cyan); }
        .timer { margin-left: auto; font-family: 'Orbitron'; font-size: 15px; color: #ff3c3c; text-shadow: 0 0 5px #ff3c3c; }

        .progress-rail { height: 2px; background: rgba(255, 255, 255, 0.05); width: 100%; }
        .progress-bar { height: 100%; background: var(--neon-cyan); width: 0%; transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); box-shadow: 0 0 15px var(--neon-cyan); }

        /* 📱 Interface Layout */
        .main-wrapper { display: flex; flex: 1; overflow: hidden; padding: 12px; gap: 12px; }
        .question-card { flex: 1.4; background: var(--glass-blur); backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); padding: 22px; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        .q-tag { display: inline-block; padding: 4px 10px; background: rgba(0, 242, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); border-radius: 6px; font-weight: 900; font-size: 9px; font-family: 'Orbitron'; margin-bottom: 12px; }
        .q-body { font-size: 13.5px; line-height: 1.8; font-weight: 500; color: #cbd5e1; white-space: pre-wrap; }

        .choice-grid { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .option { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); padding: 14px; border-radius: 16px; cursor: pointer; display: flex; align-items: flex-start; transition: all 0.3s ease; }
        .option:hover { background: rgba(0, 242, 255, 0.05); border-color: rgba(0, 242, 255, 0.3); }
        .option.active { background: linear-gradient(135deg, rgba(0, 98, 255, 0.2), rgba(112, 0, 255, 0.2)); border-color: var(--neon-cyan); color: var(--neon-cyan); transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .opt-id { width: 22px; height: 22px; border: 1px solid currentColor; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 10px; font-weight: 900; flex-shrink: 0; margin-top: 1px; }
        .opt-txt { font-size: 12.5px; line-height: 1.5; font-weight: 500; }

        /* 🕹️ Navigation Footer */
        .footer { display: flex; height: 72px; background: rgba(0, 0, 0, 0.95); padding: 12px; gap: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { flex: 1; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; font-size: 11px; color: #fff; transition: 0.2s; position: relative; overflow: hidden; }
        .btn-p { background: #1a1f2e; color: #64748b; }
        .btn-n { background: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 98, 255, 0.3); }
        .btn-f { background: linear-gradient(90deg, var(--neon-cyan), var(--deep-purple)); flex: 1.6; font-family: 'Orbitron'; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* 📈 Final Analytics */
        #report-screen { position: fixed; inset: 0; background: var(--dark-void); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 40px 15px; overflow-y: auto; }
        .score-orb { width: 140px; height: 140px; border: 4px solid var(--neon-cyan); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 25px 0; background: rgba(0, 242, 255, 0.03); box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); position: relative; }
        .score-val { font-size: 48px; font-weight: 900; font-family: 'Orbitron'; color: var(--neon-cyan); }
        .summary-card { background: rgba(255,255,255,0.03); border-radius: 16px; width: 100%; max-width: 480px; padding: 18px; margin-bottom: 10px; border-left: 6px solid #2d3748; }
        .pass { border-left-color: #00ff88; }
        .fail { border-left-color: #ff3c3c; }

        @media (max-width: 768px) { .main-wrapper { flex-direction: column; } .question-card { flex: none; height: 48%; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">GXOKER စနစ်သစ်UBT SET-50</div>
        <div class="timer" id="clock">20:00</div>
    </div>
    <div class="progress-rail"><div class="progress-bar" id="p-bar"></div></div>

    <div class="main-wrapper">
        <div class="question-card">
            <div class="q-tag" id="q-label">SYSTEM SCAN 01</div>
            <div class="q-body" id="q-text">Initializing law database...</div>
        </div>
        <div class="choice-grid" id="opt-container"></div>
    </div>

    <div class="footer">
        <button class="nav-btn btn-p" onclick="moveQ(-1)">PREV</button>
        <button class="nav-btn btn-n" onclick="moveQ(1)">NEXT</button>
        <button class="nav-btn btn-f" onclick="finalize()">FINISH MISSION</button>
    </div>

    <div id="report-screen">
        <h2 style="font-family:'Orbitron'; color: var(--neon-cyan); letter-spacing: 3px;">SYSTEM REPORT</h2>
        <div class="score-orb">
            <span class="score-val" id="total-score">0</span>
            <span style="font-size:10px; font-weight:900; letter-spacing:2px; opacity: 0.7;">PTS</span>
        </div>
        <button class="nav-btn btn-n" style="width:240px; height:50px; flex:none; margin-bottom:30px; font-family:'Orbitron';" onclick="location.reload()">RE-BOOT TEST</button>
        <div id="review-feed" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    </div>

<script>
    const examData = [
        { q: "1. \"출국만기보험은 외국인 근로자가 한국에서 퇴직할 때 받는 퇴직금을 보장하기 위한 보험입니다. 사업주는 의무적으로 매달 일정 금액을 금융기관에 적립해야 합니다. 근로자가 1년 이상 근무하고 출국하거나 사업장을 변경할 때 지급 사유가 발생합니다.\"", a: ["출국만기보험은 근로자가 직접 가입하고 돈을 내야 합니다.", "1년 미만 근무한 경우에도 퇴직금을 전액 받을 수 있습니다.", "사업주가 퇴직금 지급을 위해 매달 적립하는 보험입니다.", "출국만기보험은 한국을 떠나기 전에는 절대로 신청할 수 없습니다."], c: 2 },
        { q: "2. \"산업재해보상보험(산재보험)은 업무 중에 발생한 사고나 질병에 대해 치료비와 휴업급여를 지원하는 제도입니다. 사업주가 전액 보험료를 부담하며, 외국인 근로자도 한국인과 동일하게 혜택을 받습니다. 사고가 발생하면 즉시 근로복지공단에 신청해야 합니다.\"", a: ["산재보험료는 근로자의 월급에서 공제됩니다.", "업무 외에 주말에 다친 사고도 산재보험으로 처리됩니다.", "외국인 근로자도 업무 중 사고 시 산재 혜택을 받을 수 있습니다.", "산재보험은 사고가 나고 1년이 지난 후에만 신청이 가능합니다."], c: 2 },
        { q: "3. \"표준근로계약서에는 근무 장소, 업무 내용, 근로 시간 및 휴게 시간이 명확히 기재되어 있어야 합니다. 특히 임금의 구성 항목과 지급 방법, 계산 방식을 꼼꼼히 확인하는 것이 중요합니다. 계약을 체결한 후에는 반드시 계약서 한 부를 근로자가 보관해야 합니다.\"", a: ["근로 계약서는 사장님만 보관하면 됩니다.", "계약서에 업무 내용이 없어도 서명을 해야 합니다.", "자신의 권리를 지키기 위해 계약 내용을 잘 확인하고 보관해야 합니다.", "임금 계산 방식은 계약서에 적지 않아도 나중에 알 수 있습니다."], c: 2 },
        { q: "4. \"연장근로는 법정 근로시간인 주 40시간을 초과하여 일하는 것을 말합니다. 연장근로를 할 경우에는 통상임금의 50%를 가산하여 수당으로 받아야 합니다. 다만, 상시 5인 미만 사업장의 경우에는 가산 수당이 지급되지 않을 수도 있습니다.\"", a: ["5인 이상 사업장에서는 연장근로 시 1.5배의 임금을 받습니다.", "모든 공장에서는 연장근로를 해도 평소와 똑같은 월급을 줍니다.", "연장근로는 근로자가 원하면 무제한으로 할 수 있습니다.", "주 40시간 미만으로 일하는 것을 연장근로라고 부릅니다."], c: 0 },
        { q: "5. \"외국인 근로자가 한국에 입국한 후에는 15일 이내에 반드시 취업 교육을 받아야 합니다. 교육 기관에서는 한국어, 한국 문화, 산업 안전 등에 대한 기초 지식을 가르쳐 줍니다. 이 교육은 한국 사회에 빠르게 적응하고 안전 사고를 예방하는 데 목적이 있습니다.\"", a: ["취업 교육은 한국에 오기 전에 고향에서만 받습니다.", "입국 후 안전과 적응을 위해 반드시 받아야 하는 교육입니다.", "취업 교육을 받지 않아도 바로 일을 시작할 수 있습니다.", "한국말을 잘하는 근로자는 교육을 생략해도 됩니다."], c: 1 },
        { q: "6. \"작업장 내에서 화학 물질을 취급할 때는 반드시 MSDS(물질안전보건자료)를 확인해야 합니다. 여기에는 물질의 위험성, 취급 주의사항, 사고 시 응급조치 요령 등이 자세히 적혀 있습니다. MSDS는 근로자가 쉽게 볼 수 있는 장소에 항상 비치되어야 합니다.\"", a: ["MSDS는 사장님의 사무실에만 보관하면 됩니다.", "화학 물질의 이름만 알면 MSDS는 확인할 필요가 없습니다.", "위험한 물질을 안전하게 다루기 위해 MSDS를 잘 읽어야 합니다.", "사고가 난 후에만 MSDS를 확인하는 것이 원칙입니다."], c: 2 },
        { q: "7. \"귀국비용보험은 외국인 근로자가 체류 기간이 만료되어 본국으로 돌아갈 때 필요한 항공료를 준비하기 위한 보험입니다. 입국 후 80일 이내에 근로자가 직접 보험료를 일시금이나 분할로 납부해야 합니다. 이 돈은 나중에 출국할 때 보험금으로 돌려받습니다.\"", a: ["귀국비용보험은 사장님이 근로자를 위해 내주는 돈입니다.", "한국에 계속 살고 싶은 사람만 가입하는 보험입니다.", "출국할 때 필요한 비행기 표값을 마련하기 위해 직접 내는 보험입니다.", "귀국비용보험은 입국한 날 바로 전액을 다 내야 합니다."], c: 2 },
        { q: "8. \"건강보험은 질병이나 부상으로 인해 병원에서 진료를 받을 때 병원비 부담을 줄여주는 제도입니다. 외국인 근로자도 의무적으로 가입해야 하며, 매달 보험료의 절반은 사업주가 부담합니다. 병원에 갈 때 외국인등록증을 지참하면 건강보험 혜택을 받을 수 있습니다.\"", a: ["건강보험료는 사업주가 전액을 다 내줍니다.", "병원비가 많이 나올 때를 대비하여 가입하는 필수 보험입니다.", "외국인 근로자는 아파도 건강보험 혜택을 받을 수 없습니다.", "건강보험은 큰 수술을 할 때만 사용할 수 있는 보험입니다."], c: 1 },
        { q: "9. \"사업장 변경은 원칙적으로 금지되어 있지만 부당한 처우나 폐업 등 정당한 사유가 있을 때만 허용됩니다. 변경을 원하는 근로자는 고용센터에 신청하여 승인을 받아야 합니다. 승인을 받지 않고 다른 곳에서 일하면 불법 취업이 되어 강제 출국될 수 있습니다.\"", a: ["외국인 근로자는 돈을 더 많이 주는 곳으로 자유롭게 옮길 수 있습니다.", "사업장을 옮기려면 반드시 고용센터의 승인을 받아야 합니다.", "회사가 문을 닫아도 사업장 변경은 절대로 할 수 없습니다.", "승인을 기다리는 동안 다른 공장에서 일해도 괜찮습니다."], c: 1 },
        { q: "10. \"최저임금제는 국가가 임금의 최저 수준을 정하여 근로자의 생활 안정을 돕는 제도입니다. 모든 사업주는 정부가 정한 최저임금 이상의 금액을 근로자에게 지급해야 합니다. 외국인 근로자도 한국인과 차별 없이 최저임금법을 적용받습니다.\"", a: ["최저임금은 사장님이 매달 기분에 따라 결정합니다.", "외국인 근로자에게는 최저임금보다 적게 줘도 법적으로 괜찮습니다.", "근로자의 생계를 보호하기 위해 법으로 정한 최소한의 급여입니다.", "경력이 많은 사람만 최저임금을 받을 수 있습니다."], c: 2 },
        { q: "11. \"상해보험은 외국인 근로자가 업무 외적인 사고로 사망하거나 다쳤을 때 보상받기 위한 보험입니다. 산재보험이 일할 때의 사고를 보장한다면, 상해보험은 일상생활 중의 사고를 보장합니다. 입국 후 15일 이내에 전용 보험사에 가입해야 합니다.\"", a: ["일하다가 다친 사고는 상해보험으로 보상을 받습니다.", "상해보험은 가입하고 싶지 않으면 안 해도 되는 선택 사항입니다.", "업무와 관련 없는 일상 속 사고를 대비해 가입하는 보험입니다.", "상해보험은 한국을 떠날 때 환급받는 저축형 보험입니다."], c: 2 },
        { q: "12. \"연차 유급 휴가는 1년 동안 80% 이상 성실히 근무한 근로자에게 주어지는 유급 휴가입니다. 근로자는 1년에 15일의 휴가를 사용할 수 있으며, 쉬는 동안에도 임금을 받을 수 있습니다. 만약 휴가를 사용하지 못했다면 회사로부터 연차 수당을 받을 수 있습니다.\"", a: ["휴가를 쓰면 그날의 월급은 받을 수 없습니다.", "일을 많이 한 근로자에게 주는 15일의 유급 휴가입니다.", "연차 휴가는 회사에서 정해준 날에만 반드시 써야 합니다.", "1년 미만 근무한 근로자에게도 15일의 휴가가 생깁니다."], c: 1 },
        { q: "13. \"임금체불 보증보험은 회사가 경영이 어려워져서 근로자에게 월급을 주지 못할 때를 대비한 보험입니다. 사업주가 의무적으로 가입하며, 임금이 체불되면 보험회사가 일정 금액 내에서 대신 지급합니다. 이는 외국인 근로자의 안정적인 생활을 보장하기 위한 장치입니다.\"", a: ["사장님이 돈이 없어서 월급을 못 줄 때 도움을 주는 보험입니다.", "근로자가 돈을 모으기 위해 직접 가입하는 저축 보험입니다.", "임금체불 보증보험은 퇴직금을 주기 위해 만든 보험입니다.", "월급을 잘 받고 있다면 이 보험은 신청할 필요가 없습니다."], c: 0 },
        { q: "14. \"외국인등록증은 한국에서 신분증 역할을 하므로 항상 소지하고 다녀야 합니다. 만약 등록증을 분실했다면 15일 이내에 출입국 관청에 신고하고 재발급을 받아야 합니다. 외국인등록번호는 은행 계좌를 만들거나 휴대전화를 개통할 때 꼭 필요합니다.\"", a: ["외국인등록증은 집안에 안전하게 보관하고 다니지 않아도 됩니다.", "등록증을 잃어버렸을 때는 다시 만들지 않아도 처벌받지 않습니다.", "한국 생활에 꼭 필요한 신분증이므로 잃어버리면 즉시 재발급받아야 합니다.", "외국인등록증은 일할 때만 필요한 카드로 평소에는 없어도 됩니다."], c: 2 },
        { q: "15. \"체류 기간 연장은 현재 비자가 만료되기 전에 출입국 관청에 신청해야 합니다. 보통 만료 4개월 전부터 신청이 가능하며, 기간이 지나면 불법 체류가 되므로 주의해야 합니다. 신청 시에는 여권, 외국인등록증, 고용계약서 등의 서류가 필요합니다.\"", a: ["비자가 만료된 후에 신청해도 과태료만 내면 연장이 됩니다.", "비자 만료일이 되기 전에 미리 준비하여 연장 신청을 해야 합니다.", "체류 기간 연장은 사장님만 가서 신청하면 되는 일입니다.", "1년마다 무조건 고향에 다녀와야 비자가 연장됩니다."], c: 1 },
        { q: "16. \"근로 시간 도중에 주어지는 휴게 시간(점심시간 포함)은 근로 시간에서 제외됩니다. 4시간 근무 시 30분, 8시간 근무 시 1시간 이상의 휴게 시간을 주어야 합니다. 이 시간은 근로자가 자유롭게 이용할 수 있으며 임금은 지급되지 않는 것이 원칙입니다.\"", a: ["점심시간에도 일을 하면 월급을 두 배로 받을 수 있습니다.", "휴게 시간은 법적으로 정해져 있으며 일하는 시간에 포함되지 않습니다.", "휴게 시간은 사장님이 허락할 때만 쉴 수 있는 시간입니다.", "8시간 일하는 동안은 단 1분도 쉬지 않고 계속 일해야 합니다."], c: 1 },
        { q: "17. \"근로 현장에서 성희롱이나 폭언을 당했을 때는 즉시 거부 의사를 밝히고 관리자에게 알려야 합니다. 또한 증거를 수집하고 고용노동부나 상담센터의 도움을 받는 것이 좋습니다. 모든 근로자는 폭력과 차별로부터 보호받을 권리가 있습니다.\"", a: ["참는 것이 직장 생활을 오래 할 수 있는 최고의 방법입니다.", "괴롭힘을 당했을 때는 혼자 해결하거나 무시해야 합니다.", "자신의 권리를 지키기 위해 적극적으로 신고하고 도움을 받아야 합니다.", "사장님에게는 어떤 경우에도 불만을 말해서는 안 됩니다."], c: 2 },
        { q: "18. \"야간근로는 저녁 10시부터 다음 날 새벽 6시 사이에 일하는 것을 말합니다. 이 시간에 근무할 경우에는 통상임금에 50%의 가산 수당을 더해서 받아야 합니다. 밤에 일하는 것은 건강에 영향을 줄 수 있으므로 충분한 휴식이 필요합니다.\"", a: ["밤늦게 일해도 낮에 일하는 것과 월급이 똑같습니다.", "저녁 10시 이후 근무 시 수당을 더 많이 받을 수 있습니다.", "야간근로는 피곤해도 쉬지 않고 일해야 생산성이 올라갑니다.", "낮보다 밤에 일하는 것이 모든 근로자에게 의무입니다."], c: 1 },
        { q: "19. \"해고는 사업주가 근로자와의 계약을 일방적으로 해지하는 것입니다. 법적으로 해고를 하려면 적어도 30일 전에 근로자에게 알려주어야 하며, 그렇지 않으면 30일분 이상의 임금을 지급해야 합니다. 정당한 이유 없는 해고는 법적 보호를 받을 수 없습니다.\"", a: ["사장님은 오늘 당장 근로자를 나가라고 할 권리가 있습니다.", "해고를 할 때는 미리 알려주거나 법적 보상을 해주어야 합니다.", "해고를 당하면 외국인 근로자는 아무런 대처를 할 수 없습니다.", "일을 잘 못 하는 근로자는 예고 없이 해고해도 불법이 아닙니다."], c: 1 },
        { q: "20. \"국민연금은 노후나 장애, 사망 시에 본인이나 유족에게 연금을 지급하여 생활을 돕는 제도입니다. 일부 국가의 외국인 근로자는 귀국할 때 그동안 낸 연금 보험료를 반환일시금으로 돌려받을 수 있습니다. 자신이 대상인지 미리 확인하는 것이 중요합니다.\"", a: ["국민연금은 한국 사람만 가입할 수 있는 보험입니다.", "연금 보험료는 한 번 내면 절대로 돌려받을 수 없는 세금입니다.", "국가 간 협정에 따라 귀국 시 냈던 연금을 돌려받을 수 있습니다.", "국민연금은 사고가 났을 때 병원비를 주는 보험입니다."], c: 2 }
    ];

    let currentIdx = 0, userChoices = Array(20).fill(null), timeLeft = 1200;

    function renderQuestion() {
        const item = examData[currentIdx];
        document.getElementById('q-label').innerText = `LAW DATABASE UNIT ${currentIdx + 1}`;
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('opt-container').innerHTML = item.a.map((opt, i) => `
            <div class="option ${userChoices[currentIdx] === i ? 'active' : ''}" onclick="selectOpt(${i})">
                <div class="opt-id">${i+1}</div>
                <div class="opt-txt">${opt}</div>
            </div>
        `).join('');
        document.getElementById('p-bar').style.width = `${(userChoices.filter(x => x !== null).length / 20) * 100}%`;
    }

    function selectOpt(i) { userChoices[currentIdx] = i; renderQuestion(); }
    function moveQ(d) { if(currentIdx+d >= 0 && currentIdx+d < 20) { currentIdx += d; renderQuestion(); } }

    const timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('clock').innerText = `${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) finalize();
    }, 1000);

    function finalize() {
         အကုန်ဖြေပြီးပြီလား ?")) return;
        clearInterval(timerInterval);
        const score = userChoices.filter((a, i) => a === examData[i].c).length * 5;
        document.getElementById('total-score').innerText = score;
        document.getElementById('report-screen').style.display = 'flex';
        document.getElementById('review-feed').innerHTML = examData.map((d, i) => `
            <div class="summary-card ${userChoices[i] === d.c ? 'pass' : 'fail'}">
                <b style="color:var(--neon-cyan)">UNIT ${i+1}: ${userChoices[i] === d.c ? 'DATA MATCHED' : 'ERROR FOUND'}</b><br>
                <span style="font-size:11px; opacity:0.7;">정답: ${d.a[d.c]}</span>
            </div>
        `).join('');
    }

    renderQuestion();
</script>
